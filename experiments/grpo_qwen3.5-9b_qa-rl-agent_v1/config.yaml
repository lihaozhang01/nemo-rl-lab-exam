# QA-RL 多轮检索 Agent：H200 141GB 单卡主线配置。
defaults:
  - ../../configs/base/grpo_sliding_puzzle.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/base/grpo_megatron.yaml
  - ../../configs/base/grpo_lora.yaml

policy:
  model_name: "Qwen/Qwen3.5-9B-Base"
  tokenizer:
    name: "Qwen/Qwen3.5-9B-Base"
  max_total_sequence_length: 1536
  train_global_batch_size: 32
  generation_batch_size: 16
  generation:
    max_new_tokens: 256
    temperature: 1.0
    top_p: 0.95
    stop_strings: ["</search>"]
    vllm_cfg:
      gpu_memory_utilization: 0.55

grpo:
  num_prompts_per_step: 4
  num_generations_per_prompt: 8
  max_rollout_turns: 6
  max_num_steps: 300
  val_period: 10
  val_at_start: true
  val_at_end: true
  max_val_samples: 128
  val_batch_size: 64

loss_fn:
  reference_policy_kl_penalty: 0.01

data:
  _override_: true
  max_input_seq_length: ${policy.max_total_sequence_length}
  shuffle: false
  num_workers: 1
  use_multiple_dataloader: false
  train:
    data_path: /data/datasets/qa_rl/train.jsonl
  validation:
    data_path: /data/datasets/qa_rl/val.jsonl

env:
  qa_agent:
    cfg:
      docs_dir: /data/docs
      require_docs: true
      max_turns: 6
      reward_phase: curriculum
      feedback_style: natural
      search_top_k: 4
      max_queries_per_turn: 3
      max_query_chars: 64
      max_retrieval_tokens_per_turn: 240
      max_total_retrieval_tokens: 560
      max_bad_output_chars: 160

logger:
  wandb_enabled: false
  tensorboard_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  num_val_samples_to_print: 3
